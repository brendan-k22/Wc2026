<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#001347;--ink2:#0a2472;--gold:#C9921A;--gold2:#F5C842;--gold3:#FDF3D0;--red:#C1121F;--green:#22c55e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--ink);color:#fff;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse at 15% 10%,rgba(26,58,143,.3) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 90%,rgba(201,146,26,.12) 0%,transparent 55%),
  linear-gradient(155deg,#001347 0%,#021055 50%,#000e30 100%);pointer-events:none}

/* HERO */
.hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:26px 20px 18px;border-bottom:2px solid rgba(201,146,26,.3);background:linear-gradient(180deg,rgba(0,19,71,.97),rgba(0,19,71,.5))}
.hero-flags{display:flex;gap:14px;font-size:26px;margin-bottom:10px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,74px);letter-spacing:5px;background:linear-gradient(135deg,var(--gold2),var(--gold),#9a6c0e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;text-align:center}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:14px;letter-spacing:6px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:4px;text-align:center}
.hero-date{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:4px;color:var(--gold);margin-top:7px;text-transform:uppercase}

/* TABS */
.tabs{position:sticky;top:0;z-index:100;display:flex;background:rgba(0,19,71,.97);border-bottom:2px solid rgba(201,146,26,.35);backdrop-filter:blur(14px)}
.tab-btn{flex:1;padding:13px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;transition:.2s;border-bottom:3px solid transparent;position:relative;top:2px}
.tab-btn:hover{color:var(--gold2)}
.tab-btn.active{color:var(--gold2);border-bottom-color:var(--gold)}

/* SECTIONS */
.section{display:none;position:relative;z-index:1;padding:24px 16px 70px}
.section.active{display:block}
.sec-hdr{text-align:center;margin-bottom:22px}
.sec-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--gold2)}
.sec-hdr p{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:3px}

/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;max-width:1440px;margin:0 auto}
.gcard{background:rgba(255,255,255,.04);border:1px solid rgba(201,146,26,.2);border-radius:12px;overflow:hidden;backdrop-filter:blur(6px);transition:.2s}
.gcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,146,26,.14)}
.gcard-hdr{background:linear-gradient(135deg,var(--ink2),#0e1f55);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--gold)}
.gletter{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.glabel{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase}
.std{width:100%;border-collapse:collapse}
.std thead th{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;padding:5px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
.std thead th:nth-child(2){text-align:left}
.std tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:.1s}
.std tbody tr:hover{background:rgba(255,255,255,.03)}
.std td{padding:8px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600}
.std td:nth-child(2){text-align:left}
.tcell{display:flex;align-items:center;gap:6px}
.tflag{font-size:16px}.tname{font-size:12px;font-weight:600}
.rbadge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:700}
.r1{background:var(--gold);color:var(--ink)}.r2{background:rgba(201,146,26,.25);color:var(--gold2)}
.r3{background:rgba(255,255,255,.09);color:rgba(255,255,255,.5)}.r4{background:rgba(193,18,31,.18);color:rgba(193,18,31,.8)}
.qdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;flex-shrink:0}
.q1,.q2{background:var(--green)}.q3{background:var(--gold)}.q4{background:var(--red)}
.dp{color:var(--green)}.dn{color:var(--red)}.dz{color:rgba(255,255,255,.3)}
.msec{border-top:1px solid rgba(255,255,255,.06);padding:10px 13px 12px}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:8px}
.mrow{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.mday{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:var(--gold);min-width:16px}
.mteam{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;color:rgba(255,255,255,.75);flex:1;text-align:right}
.mteam.r{text-align:left}
.mteam .f{font-size:12px;margin-left:2px}.mteam.r .f{margin-left:0;margin-right:2px}
.sinp{width:32px;height:28px;background:rgba(201,146,26,.1);border:1.5px solid rgba(201,146,26,.35);border-radius:5px;color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center;outline:none;transition:.15s}
.sinp:focus{background:rgba(201,146,26,.2);border-color:var(--gold)}
.ssep{font-family:'Bebas Neue',sans-serif;font-size:13px;color:rgba(255,255,255,.2)}

/* SAVE */
.gsave{position:fixed;bottom:20px;right:20px;z-index:200;padding:12px 24px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#7a5000);border:none;color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 5px 24px rgba(201,146,26,.38);transition:.2s}
.gsave:hover{transform:translateY(-2px);box-shadow:0 9px 34px rgba(201,146,26,.48)}
.toast{position:fixed;bottom:70px;right:20px;z-index:300;background:rgba(34,197,94,.92);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border-radius:6px;opacity:0;transform:translateY(6px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ═══════════════ BRACKET ═══════════════ */
.bkt-scroll{overflow-x:auto;padding:0 8px 20px}

/* Layout: bracket visuel avec SVG pour les connecteurs */
.bkt-wrap{
  position:relative;
  min-width:1500px;
  display:flex;
  flex-direction:column;
}
.rounds-bar{
  display:flex;
  align-items:center;
  margin-bottom:8px;
  gap:0;
}
.rb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:center;padding:4px 0;border-bottom:1px solid rgba(201,146,26,.2);flex:1}
.rb.center{color:var(--gold2);font-size:11px;border-bottom-color:var(--gold);flex:0 0 200px}

.bkt-body{
  display:flex;
  align-items:stretch;
  gap:0;
  position:relative;
}

/* Colonnes du bracket */
.bcol{
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  flex:1;
  min-width:0;
  padding:0 2px;
}

/* match card */
.bm{background:rgba(255,255,255,.04);border:1px solid rgba(201,146,26,.18);border-radius:6px;overflow:hidden;margin:3px 2px;transition:.15s}
.bm:hover{border-color:rgba(201,146,26,.5)}
.bt{display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.05);transition:.1s;min-height:24px}
.bt:last-child{border-bottom:none}
.bt.win{background:rgba(34,197,94,.08)}
.bt.lose{opacity:.45}
.bf{font-size:13px;flex-shrink:0}
.bn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.85)}
.bn.tbd{color:rgba(255,255,255,.2);font-style:italic;font-weight:400;font-size:10px}
.bs{width:22px;height:19px;background:rgba(201,146,26,.08);border:1px solid rgba(201,146,26,.2);border-radius:3px;color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:13px;text-align:center;outline:none;transition:.15s;flex-shrink:0}
.bs:focus{border-color:var(--gold);background:rgba(201,146,26,.2)}
.bs:disabled{background:transparent;border-color:transparent;color:rgba(255,255,255,.1);cursor:default}

/* Centre */
.cup-center{flex:0 0 200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;position:relative}
.cup-glow{position:absolute;inset:-20px;background:radial-gradient(ellipse,rgba(201,146,26,.2) 0%,transparent 65%);pointer-events:none}
.cup-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%}
.cup-trophy{font-size:60px;filter:drop-shadow(0 0 22px rgba(201,146,26,.6));animation:float 3s ease-in-out infinite;line-height:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.cup-yr{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-top:2px}
.cup-hosts{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;margin:2px 0 8px}
.final-box{width:100%;border:1px solid rgba(201,146,26,.45);border-radius:8px;overflow:hidden;margin-bottom:7px}
.final-lbl{background:linear-gradient(135deg,var(--gold),#8a5800);color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:8px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:4px}
.ftr{display:flex;align-items:center;gap:5px;padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.03)}
.ftr:last-child{border-bottom:none}
.ftr.win{background:rgba(201,146,26,.1)}
.fflag{font-size:15px}.fname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;flex:1}
.fname.tbd{color:rgba(255,255,255,.2);font-style:italic;font-weight:400;font-size:10px}
.fscr{width:26px;height:22px;background:rgba(201,146,26,.12);border:1.5px solid rgba(201,146,26,.38);border-radius:4px;color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;outline:none}
.fscr:focus{border-color:var(--gold)}
.fscr:disabled{background:transparent;border-color:transparent;color:rgba(255,255,255,.12);cursor:default}
.champ-box{width:100%;background:linear-gradient(135deg,rgba(201,146,26,.16),rgba(201,146,26,.04));border:1px solid rgba(201,146,26,.48);border-radius:8px;padding:9px;text-align:center;margin-bottom:6px}
.champ-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold2);letter-spacing:2px}
.p3-box{width:100%;border:1px solid rgba(255,255,255,.09);border-radius:7px;overflow:hidden}
.p3-lbl{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:8px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:4px}

/* Connecteurs visuels entre colonnes */
.bkt-connectors{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:0}
.bcol,.cup-center{position:relative;z-index:1}

/* ═══ STATS ═══ */
.ctx-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.ctx-btn{padding:7px 14px;border-radius:7px;border:1px solid rgba(201,146,26,.28);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s}
.ctx-btn:hover{color:var(--gold2);border-color:rgba(201,146,26,.6)}
.ctx-btn.active{background:rgba(201,146,26,.14);color:var(--gold2);border-color:var(--gold)}
.stats-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:rgba(255,255,255,.35);gap:12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.loading-spinner{width:34px;height:34px;border:3px solid rgba(201,146,26,.18);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-empty{text-align:center;padding:36px 20px;color:rgba(255,255,255,.28);font-family:'Barlow Condensed',sans-serif;font-size:12px;line-height:2}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;max-width:1440px;margin:0 auto}
/* Team card */
.tcard{background:rgba(255,255,255,.04);border:1px solid rgba(201,146,26,.18);border-radius:11px;padding:13px;cursor:pointer;transition:.2s}
.tcard:hover{border-color:rgba(201,146,26,.52);transform:translateY(-2px);box-shadow:0 6px 22px rgba(201,146,26,.12)}
.tcard-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
.tcard-sub{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.32);text-transform:uppercase}
.tcard-form{display:flex;gap:3px;margin:8px 0;flex-wrap:wrap}
.fdot{display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;color:#fff;flex-shrink:0}
.tcard-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:5px}
.tst{background:rgba(255,255,255,.05);border-radius:5px;padding:5px 3px;text-align:center}
.tst-v{font-family:'Bebas Neue',sans-serif;font-size:16px;line-height:1}
.tst-l{font-family:'Barlow Condensed',sans-serif;font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.32);text-transform:uppercase;margin-top:1px}
/* Detail */
.dg4{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.d2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:650px){.d2col{grid-template-columns:1fr}}
.dcard{background:rgba(255,255,255,.04);border:1px solid rgba(201,146,26,.16);border-radius:10px;padding:13px}
.dcard-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(201,146,26,.18)}
.bstats{display:flex;gap:7px;flex-wrap:wrap}
.bs{flex:1;min-width:55px;background:rgba(255,255,255,.05);border-radius:7px;padding:9px 6px;text-align:center}
.bs-v{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.bs-l{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.32);text-transform:uppercase;margin-top:2px}
.form-match-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fmr-score{font-family:'Bebas Neue',sans-serif;font-size:15px;min-width:28px}
.fmr-opp{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.6);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmr-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:rgba(255,255,255,.28)}
/* Player table */
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;padding:4px 7px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
.ptable th:nth-child(2),.ptable td:nth-child(1){text-align:left}
.ptable td{padding:6px 7px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.04)}
.prow{cursor:pointer;transition:.1s}
.prow:hover{background:rgba(201,146,26,.07)}
.pname{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px}
.pbadge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:1px}
.pos-g{background:rgba(201,146,26,.22);color:var(--gold2)}
.pos-d{background:rgba(34,197,94,.18);color:#4ade80}
.pos-m{background:rgba(59,130,246,.22);color:#93c5fd}
.pos-a{background:rgba(239,68,68,.22);color:#fca5a5}
/* Player modal */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.mgrp{background:rgba(255,255,255,.04);border-radius:9px;padding:11px}
.mgt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid rgba(201,146,26,.18)}
.mr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-family:'Barlow Condensed',sans-serif;font-size:11px}
.mr span{color:rgba(255,255,255,.45)}.mr strong{color:#fff}
/* Forme inline groupes */
.team-form-inline{display:flex;gap:2px;margin-top:3px}

</style>
</head>
<body>

<header class="hero">
  <div class="hero-flags">🇺🇸 🇨🇦 🇲🇽</div>
  <div class="hero-title">FIFA World Cup 2026</div>
  <div class="hero-sub">États-Unis &nbsp;·&nbsp; Canada &nbsp;·&nbsp; Mexique</div>
  <div class="hero-date">⚽ &nbsp; 11 juin — 19 juillet 2026 &nbsp; ⚽</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('groups',this)">🏟️ Phase de Groupes</button>
  <button class="tab-btn" onclick="showTab('bracket',this)">🏆 Phase Finale</button>
  <button class="tab-btn" onclick="showTab('stats',this)">📊 Statistiques</button>
</nav>

<section id="groups-section" class="section active">
  <div class="sec-hdr"><h2>Phase de Groupes</h2><p>Saisir les scores · Classement automatique FIFA 2026</p></div>
  <div class="groups-grid" id="groups-grid"></div>
</section>

<section id="bracket-section" class="section">
  <div class="sec-hdr"><h2>Phase à Élimination Directe</h2><p>Round of 32 · R16 · Quarts · Demis · Finale · 19 juillet — MetLife Stadium</p></div>
  <div class="bkt-scroll" id="bkt-scroll"></div>
</section>

<section id="stats-section" class="section">
</section>

<div class="toast" id="toast">✓ Sauvegardé !</div>
<button class="gsave" onclick="saveAll()">💾 Enregistrer</button>

<script>
const GRP={
  A:{t:[{n:"Mexique",f:"🇲🇽"},{n:"Corée du Sud",f:"🇰🇷"},{n:"Tchéquie",f:"🇨🇿"},{n:"Afrique du Sud",f:"🇿🇦"}]},
  B:{t:[{n:"Canada",f:"🇨🇦"},{n:"Suisse",f:"🇨🇭"},{n:"Bosnie-Herzégovine",f:"🇧🇦"},{n:"Qatar",f:"🇶🇦"}]},
  C:{t:[{n:"Brésil",f:"🇧🇷"},{n:"Maroc",f:"🇲🇦"},{n:"Écosse",f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},{n:"Haïti",f:"🇭🇹"}]},
  D:{t:[{n:"États-Unis",f:"🇺🇸"},{n:"Turquie",f:"🇹🇷"},{n:"Australie",f:"🇦🇺"},{n:"Paraguay",f:"🇵🇾"}]},
  E:{t:[{n:"Allemagne",f:"🇩🇪"},{n:"Côte d'Ivoire",f:"🇨🇮"},{n:"Équateur",f:"🇪🇨"},{n:"Curaçao",f:"🇨🇼"}]},
  F:{t:[{n:"Pays-Bas",f:"🇳🇱"},{n:"Japon",f:"🇯🇵"},{n:"Suède",f:"🇸🇪"},{n:"Tunisie",f:"🇹🇳"}]},

// ── STANDINGS ──
function gsc(l,m,s){const v=scores[`${l}_${m}_${s}`];return(v===''||v===undefined)?null:parseInt(v);}
function computeStandings(letter){
  const st=GRP[letter].t.map((t,i)=>({i,t,pts:0,j:0,g:0,n:0,p:0,bp:0,bc:0,diff:0}));
  PAIRS.forEach(([a,b],m)=>{
    const s1=gsc(letter,m,0),s2=gsc(letter,m,1);if(s1===null||s2===null)return;
    st[a].j++;st[b].j++;st[a].bp+=s1;st[a].bc+=s2;st[b].bp+=s2;st[b].bc+=s1;
    if(s1>s2){st[a].pts+=3;st[a].g++;st[b].p++;}
    else if(s1<s2){st[b].pts+=3;st[b].g++;st[a].p++;}
    else{st[a].pts++;st[a].n++;st[b].pts++;st[b].n++;}
  });
  st.forEach(s=>s.diff=s.bp-s.bc);
  st.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const tied=st.filter(x=>x.pts===a.pts);
    if(tied.length>=2){
      const h=computeH2H(letter,tied.map(x=>x.i));
      if(h[b.i].pts!==h[a.i].pts)return h[b.i].pts-h[a.i].pts;
      if(h[b.i].diff!==h[a.i].diff)return h[b.i].diff-h[a.i].diff;
      if(h[b.i].bp!==h[a.i].bp)return h[b.i].bp-h[a.i].bp;
    }
    if(b.diff!==a.diff)return b.diff-a.diff;if(b.bp!==a.bp)return b.bp-a.bp;return 0;
  });
  return st;
}
function computeH2H(letter,idxs){
  const res={};idxs.forEach(i=>res[i]={pts:0,diff:0,bp:0,bc:0});
  PAIRS.forEach(([a,b],m)=>{
    if(!idxs.includes(a)||!idxs.includes(b))return;
    const s1=gsc(letter,m,0),s2=gsc(letter,m,1);if(s1===null||s2===null)return;
    res[a].bp+=s1;res[a].bc+=s2;res[b].bp+=s2;res[b].bc+=s1;
    if(s1>s2)res[a].pts+=3;else if(s1<s2)res[b].pts+=3;else{res[a].pts++;res[b].pts++;}
  });
  Object.values(res).forEach(r=>r.diff=r.bp-r.bc);return res;
}
function getStanding(g,rank){return computeStandings(g)[rank]?.t||{n:'À déterminer',f:'',tbd:true};}

// ── BEST 3RD ──
function getAll3rds(){
  return Object.keys(GRP).map(l=>{const s=computeStandings(l)[2];return{l,t:s.t,pts:s.pts,diff:s.diff,bp:s.bp,j:s.j,g:s.g,n:s.n,p:s.p,bc:s.bc};})
  .sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.diff!==a.diff?b.diff-a.diff:b.bp-a.bp);
}
function getBest3rd(pools){
  const q8=getAll3rds().slice(0,8);
  return q8.find(q=>pools.includes(q.l))?.t||{n:'Meilleur 3e',f:'',tbd:true};
}
function resolveTeam(def){
  if(def.src==='W')return getStanding(def.g,0);
  if(def.src==='R')return getStanding(def.g,1);
  if(def.src==='T3')return getBest3rd(def.p);
  return{n:'?',f:'',tbd:true};
}

// ── BRACKET LOGIC ──
function bfv(rid,s){const v=bfScores[`${rid}_${s}`];return(v===''||v===undefined)?null:parseInt(v);}
function winner(rid,pair){
  const s0=bfv(rid,0),s1=bfv(rid,1);
  if(s0===null||s1===null)return{n:'À déterminer',f:'',tbd:true};
  return pair[s0>=s1?0:1];
}
function loser(rid,pair){
  const s0=bfv(rid,0),s1=bfv(rid,1);
  if(s0===null||s1===null)return{n:'À déterminer',f:'',tbd:true};
  return pair[s0>=s1?1:0];
}

function renderGroups(){
  const grid=document.getElementById('groups-grid');grid.innerHTML='';
  Object.keys(GRP).forEach(letter=>{
    const el=document.createElement('div');el.className='gcard';el.dataset.group=letter;
    el.innerHTML=buildGCard(letter);grid.appendChild(el);
    PAIRS.forEach(([a,b],m)=>[0,1].forEach(s=>{
      const k=`${letter}_${m}_${s}`,inp=el.querySelector(`[data-k="${k}"]`);
      if(!inp)return;inp.value=scores[k]??'';
      inp.addEventListener('input',e=>{const v=e.target.value.replace(/[^0-9]/g,'');e.target.value=v;scores[k]=v;refreshStd(letter);});
    }));
  });
}
function buildGCard(l){
  const st=computeStandings(l);
  return`<div class="gcard-hdr"><div class="gletter">${l}</div><div class="glabel">Groupe</div></div>
<table class="std"><thead><tr><th>#</th><th>Équipe</th><th>Pts</th><th>J</th><th>G</th><th>N</th><th>P</th><th>BP</th><th>BC</th><th>±</th></tr></thead>
<tbody data-std="${l}">${buildStdRows(st)}</tbody></table>
<div class="msec"><div class="mtitle">📅 Matchs</div>
${PAIRS.map(([a,b],m)=>`<div class="mrow">

<input class="sinp" type="text" maxlength="2" inputmode="numeric" data-k="${l}_${m}_0" placeholder="–">
<span class="ssep">:</span>
<input class="sinp" type="text" maxlength="2" inputmode="numeric" data-k="${l}_${m}_1" placeholder="–">
<span class="mteam r"><span class="f">${GRP[l].t[b].f}</span> ${GRP[l].t[b].n}</span>
</div>`).join('')}</div>`;
}
function buildStdRows(st){
  const rc=['r1','r2','r3','r4'],qc=['q1','q2','q3','q4'];
  return st.map((s,r)=>{const d=s.diff,dc=d>0?'dp':d<0?'dn':'dz',ds=d>0?'+'+d:''+d;
  return`<tr><td><span class="rbadge ${rc[r]}">${r+1}</span></td>
<td><div class="tcell"><span class="qdot ${qc[r]}"></span><span class="tflag">${s.t.f}</span><span class="tname">${s.t.n}</span><div class="team-form-inline" data-team-form="${s.t.n}"></div></div></td>
<td><strong>${s.pts}</strong></td><td>${s.j}</td><td>${s.g}</td><td>${s.n}</td><td>${s.p}</td><td>${s.bp}</td><td>${s.bc}</td>
<td class="${dc}">${s.j>0?ds:'—'}</td></tr>`;}).join('');
}
function refreshStd(l){const tb=document.querySelector(`[data-std="${l}"]`);if(tb)tb.innerHTML=buildStdRows(computeStandings(l));}

// RENDER BRACKET

function renderBracket(){
  const scroll=document.getElementById('bkt-scroll');scroll.innerHTML='';

  // Résoudre toutes les équipes
  const r32p=R32.map(m=>[resolveTeam(m.a),resolveTeam(m.b)]);

  // R16: paires de vainqueurs R32
  // Gauche: (r32_0,r32_1)→r16_0 ; (r32_2,r32_3)→r16_1 ; (r32_4,r32_5)→r16_2 ; (r32_6,r32_7)→r16_3
  // Droite: (r32_8,r32_9)→r16_4 ; (r32_10,r32_11)→r16_5 ; (r32_12,r32_13)→r16_6 ; (r32_14,r32_15)→r16_7
  const r16p=[
    [winner('r32_0',r32p[0]),winner('r32_1',r32p[1])],
    [winner('r32_2',r32p[2]),winner('r32_3',r32p[3])],
    [winner('r32_4',r32p[4]),winner('r32_5',r32p[5])],
    [winner('r32_6',r32p[6]),winner('r32_7',r32p[7])],
    [winner('r32_8',r32p[8]),winner('r32_9',r32p[9])],
    [winner('r32_10',r32p[10]),winner('r32_11',r32p[11])],
    [winner('r32_12',r32p[12]),winner('r32_13',r32p[13])],
    [winner('r32_14',r32p[14]),winner('r32_15',r32p[15])],
  ];
  const qfp=[
    [winner('r16_0',r16p[0]),winner('r16_1',r16p[1])],
    [winner('r16_2',r16p[2]),winner('r16_3',r16p[3])],
    [winner('r16_4',r16p[4]),winner('r16_5',r16p[5])],
    [winner('r16_6',r16p[6]),winner('r16_7',r16p[7])],
  ];
  const sfp=[
    [winner('qf_0',qfp[0]),winner('qf_1',qfp[1])],
    [winner('qf_2',qfp[2]),winner('qf_3',qfp[3])],
  ];
  const finp=[winner('sf_0',sfp[0]),winner('sf_1',sfp[1])];
  const champ=winner('final_0',finp);
  const p3p=[loser('sf_0',sfp[0]),loser('sf_1',sfp[1])];

  // ── Générateur de carte match ──
  function mc(rid,pair,enable=true){
    const s0=bfv(rid,0),s1=bfv(rid,1);
    const w=(s0!==null&&s1!==null)?(s0>=s1?0:1):null;
    return`<div class="bm" data-rid="${rid}">${[0,1].map(si=>{
      const t=pair[si]||{n:'À déterminer',f:'',tbd:true};
      return`<div class="bt ${w===si?'win':w!==null?'lose':''}">
<span class="bf">${t.f||''}</span><span class="bn ${t.tbd?'tbd':''}">${t.n}</span>
${enable?`<input class="bs" type="text" maxlength="2" inputmode="numeric"
  data-bk="${rid}_${si}" value="${bfScores[`${rid}_${si}`]??''}"
  placeholder="–" ${t.tbd?'disabled':''}>`:''}
</div>`}).join('')}</div>`;
  }

  // ── HTML des colonnes ──
  // GAUCHE: R32(0-7) → R16(0-3) → QF(0-1) → SF(0)
  // DROITE: SF(1) → QF(2-3) → R16(4-7) → R32(8-15)

  function col(matchesHtml,extraStyle=''){
    return`<div class="bcol" style="${extraStyle}">${matchesHtml}</div>`;
  }

  const LR32=col(R32.slice(0,8).map((_,i)=>mc(`r32_${i}`,r32p[i])).join(''));
  const LR16=col(r16p.slice(0,4).map((_,i)=>mc(`r16_${i}`,r16p[i])).join(''),'flex:0.7');
  const LQF =col(qfp.slice(0,2).map((_,i)=>mc(`qf_${i}`,qfp[i])).join(''),'flex:0.5');
  const LSF =col(mc('sf_0',sfp[0]),'flex:0.35');

  const RSF =col(mc('sf_1',sfp[1]),'flex:0.35');
  const RQF =col(qfp.slice(2,4).map((_,i)=>mc(`qf_${i+2}`,qfp[i+2])).join(''),'flex:0.5');
  const RR16=col(r16p.slice(4,8).map((_,i)=>mc(`r16_${i+4}`,r16p[i+4])).join(''),'flex:0.7');
  const RR32=col(R32.slice(8,16).map((_,i)=>mc(`r32_${i+8}`,r32p[i+8])).join(''));

  // ── Centre ──
  const fw=bfv('final_0',0)!==null&&bfv('final_0',1)!==null?(bfv('final_0',0)>=bfv('final_0',1)?0:1):null;
  const centerHTML=`<div class="cup-center">
<div class="cup-glow"></div>
<div class="cup-inner">
  <div class="cup-trophy">🏆</div>
  <div class="cup-yr">2026</div>
  <div class="cup-hosts">🇺🇸 · 🇨🇦 · 🇲🇽</div>
  <div class="final-box">
    <div class="final-lbl">🏅 Finale · 19 juillet · MetLife Stadium</div>
    ${[0,1].map(si=>{const t=finp[si];return`<div class="ftr ${fw===si?'win':''}">
<span class="fflag">${t.f||''}</span><span class="fname ${t.tbd?'tbd':''}">${t.n}</span>
<input class="fscr" type="text" maxlength="2" inputmode="numeric"
  data-bk="final_0_${si}" value="${bfScores[`final_0_${si}`]??''}"
  placeholder="–" ${t.tbd?'disabled':''}></div>`}).join('')}
  </div>
  <div class="champ-box">
    <div class="champ-lbl">🥇 Champion du Monde</div>
    <div class="champ-name">${champ&&!champ.tbd?champ.f+' '+champ.n:'À déterminer'}</div>
  </div>
  <div class="p3-box">
    <div class="p3-lbl">🥉 3e Place · 18 juillet</div>
    ${p3p.map((t,i)=>`<div class="bt" style="padding:5px 8px">
<span class="bf">${t.f||''}</span><span class="bn ${t.tbd?'tbd':''}">${t.n}</span>
<input class="bs" type="text" maxlength="2" inputmode="numeric"
  data-bk="p3_${i}" value="${bfScores[`p3_${i}`]??''}"
  placeholder="–" ${t.tbd?'disabled':''}></div>`).join('')}
  </div>
</div></div>`;

  // ── Assemblage HTML ──
  const wrap=document.createElement('div');wrap.className='bkt-wrap';
  wrap.innerHTML=`
<div class="rounds-bar">
  <div class="rb" style="flex:1">Round of 32</div>
  <div class="rb" style="flex:0.7">Round of 16</div>
  <div class="rb" style="flex:0.5">Quarts</div>
  <div class="rb" style="flex:0.35">Demis</div>
  <div class="rb center">🏆 Finale</div>
  <div class="rb" style="flex:0.35">Demis</div>
  <div class="rb" style="flex:0.5">Quarts</div>
  <div class="rb" style="flex:0.7">Round of 16</div>
  <div class="rb" style="flex:1">Round of 32</div>
</div>
<div class="bkt-body">
  ${LR32}${LR16}${LQF}${LSF}${centerHTML}${RSF}${RQF}${RR16}${RR32}
</div>`;
  scroll.appendChild(wrap);

  // Listeners
  wrap.querySelectorAll('[data-bk]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const v=e.target.value.replace(/[^0-9]/g,'');
      e.target.value=v;bfScores[e.target.dataset.bk]=v;renderBracket();
    });
  });
}

// ── INIT ──
load();renderGroups();
</script>

// Construire pastilles de forme
function buildForm(matches, teamId, size='md'){
  if(!matches?.length) return '<span style="color:rgba(255,255,255,.2);font-size:10px">—</span>';
  const w=size==='sm'?14:size==='lg'?28:20;
  const fs=size==='sm'?8:size==='lg'?13:10;
  const br=size==='sm'?3:5;
  return matches.slice(-5).map(m=>{
    const isHome = m.homeTeam?.id===teamId;
    const gs=m.score?.fullTime?.home??0, ga2=m.score?.fullTime?.away??0;
    const tf=isHome?gs:ga2, ta=isHome?ga2:gs;
    const res=tf>ta?'W':tf<ta?'L':'D';
    const bg=res==='W'?'#22c55e':res==='D'?'#f59e0b':'#ef4444';
    const lbl=res==='W'?'V':res==='D'?'N':'D';
    const opp=isHome?m.awayTeam?.name:m.homeTeam?.name;
    return `<span class="fdot" style="width:${w}px;height:${w}px;font-size:${fs}px;border-radius:${br}px;background:${bg};display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;color:#fff" title="${opp}: ${tf}–${ta}">${lbl}</span>`;
  }).join('');
}

async function buildTeamCard(team){
  const tid = FD_TEAM_IDS[team.n];
  const f = flag(team.n)||team.f;

  let formHtml='', wins=0, draws=0, losses=0, gf=0, ga=0, played=0;

  if(tid && tid!==803){
    // Derniers matchs
    const d = await fdFetch(`/v4/teams/${tid}/matches?limit=10&status=FINISHED`);
    const matches = d?.matches||[];
    formHtml = buildForm(matches, tid, 'md');

    // Calculer stats depuis les matchs
    matches.slice(-10).forEach(m=>{
      const isHome=m.homeTeam?.id===tid;
      const gs=m.score?.fullTime?.home??0, ga2=m.score?.fullTime?.away??0;
      const tf=isHome?gs:ga2, ta=isHome?ga2:gs;
      played++; gf+=tf; ga+=ta;
      if(tf>ta) wins++;
      else if(tf===ta) draws++;
      else losses++;
    });
  }

  return `<div class="tcard" data-id="${tid||0}" data-name="${team.n}" data-flag="${f}">
  <div class="tcard-hdr">
    <span style="font-size:26px">${f}</span>
    <div style="flex:1">
      <div class="tcard-name">${team.n}</div>

  </div>
  <div class="tcard-form" style="display:flex;gap:3px;margin:8px 0;flex-wrap:wrap">${formHtml||'<span style="color:rgba(255,255,255,.2);font-size:10px">Données à venir</span>'}</div>
  ${played?`<div class="tcard-stats">
    <div class="tst"><div class="tst-v">${played}</div><div class="tst-l">J</div></div>
    <div class="tst"><div class="tst-v" style="color:var(--green)">${wins}</div><div class="tst-l">V</div></div>
    <div class="tst"><div class="tst-v" style="color:var(--gold)">${draws}</div><div class="tst-l">N</div></div>
    <div class="tst"><div class="tst-v" style="color:var(--red)">${losses}</div><div class="tst-l">D</div></div>
    <div class="tst"><div class="tst-v">${gf}</div><div class="tst-l">BP</div></div>
    <div class="tst"><div class="tst-v">${ga}</div><div class="tst-l">BC</div></div>
    <div class="tst"><div class="tst-v">${gf-ga>0?'+':''}${gf-ga}</div><div class="tst-l">±</div></div>
    <div class="tst"><div class="tst-v">${played?Math.round(wins/played*100):0}%</div><div class="tst-l">Win%</div></div>

}

    hero.appendChild(badge);
    // Ajouter animation pulse au CSS
    const st = document.createElement('style');
    st.textContent = `@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .live-glow{box-shadow:0 0 0 2px rgba(193,18,31,.4)!important;border-color:rgba(193,18,31,.6)!important;}
    .live-indicator{display:inline-block;width:7px;height:7px;background:#ff4444;border-radius:50%;animation:pulse 1s infinite;margin-right:4px;vertical-align:middle}`;
    document.head.appendChild(st);
  }
}

function setLiveVisible(on){
  const b = document.getElementById('live-badge');
  if(b) b.style.display = on ? 'flex' : 'none';
}

// Fetch tous les matchs WC en cours / today
async function fetchLiveScores(){
  try {
    // 1. Matchs en cours (status=LIVE,IN_PLAY,PAUSED)
    const r1 = await fetch(`${API_BASE}/competitions/WC/matches?status=LIVE`, {
      headers:{'X-Auth-Token': API_KEY}
    });
    // 2. Matchs d'aujourd'hui (couvre aussi FINISHED du jour)
    const today = new Date().toISOString().slice(0,10);
    const r2 = await fetch(`${API_BASE}/competitions/WC/matches?dateFrom=${today}&dateTo=${today}`, {
      headers:{'X-Auth-Token': API_KEY}
    });

    if(!r1.ok && !r2.ok){ console.warn('API non disponible'); return; }

    const d1 = r1.ok ? await r1.json() : {matches:[]};
    const d2 = r2.ok ? await r2.json() : {matches:[]};

    // Fusionner et dédupliquer
    const allMatches = [...(d1.matches||[]), ...(d2.matches||[])];
    const seen = new Set();
    const matches = allMatches.filter(m=>{ if(seen.has(m.id)) return false; seen.add(m.id); return true; });

    if(!matches.length){ setLiveVisible(false); return; }

    let hasLive = false;
    let updated = false;

    matches.forEach(match => {
      const status = match.status; // IN_PLAY, PAUSED, FINISHED, TIMED, SCHEDULED
      const isActive = ['IN_PLAY','PAUSED','FINISHED'].includes(status);
      if(!isActive) return;

      if(['IN_PLAY','PAUSED'].includes(status)) hasLive = true;

      const homeNorm = normName(match.homeTeam?.name || '');
      const awayNorm = normName(match.awayTeam?.name || '');
      const homeScore = match.score?.fullTime?.home ?? match.score?.halfTime?.home;
      const awayScore = match.score?.fullTime?.away ?? match.score?.halfTime?.away;

      if(homeScore === null || homeScore === undefined) return;

      const found = findMatchKey(homeNorm, awayNorm);
      if(!found){ console.log('Match non trouvé:', homeNorm, 'vs', awayNorm); return; }

      const { letter, m, reversed } = found;
      const k0 = `${letter}_${m}_0`;
      const k1 = `${letter}_${m}_1`;

      const v0 = reversed ? String(awayScore) : String(homeScore);
      const v1 = reversed ? String(homeScore) : String(awayScore);

      // Ne mettre à jour que si différent
      if(scores[k0] !== v0 || scores[k1] !== v1){
        scores[k0] = v0;
        scores[k1] = v1;
        updated = true;
        // Marquer le groupe comme live
        liveMatchIds.add(`${letter}_${m}`);
      }
    });

    setLiveVisible(hasLive || matches.some(m=>m.status==='FINISHED'));

    if(updated){
      // Mettre à jour tous les classements et inputs visibles
      Object.keys(GRP).forEach(l => {
        refreshStd(l);
        // Mettre à jour les inputs affichés
        PAIRS.forEach(([a,b], mi) => {
          [0,1].forEach(s => {
            const k = `${l}_${mi}_${s}`;
            const inp = document.querySelector(`[data-k="${k}"]`);
            if(inp && document.activeElement !== inp) inp.value = scores[k] ?? '';
          });
        });
      });
      // Sauvegarder automatiquement
      localStorage.setItem('wc2026v5', JSON.stringify({scores, bfScores}));
      // Si bracket ouvert, le rafraîchir aussi
      if(document.getElementById('bracket-section').classList.contains('active')){
        renderBracket();
      }
    }

  } catch(e){
    console.warn('Erreur fetch scores:', e);
  }
}

// Démarrer le polling
function startLivePolling(){
  ensureLiveBadge();
  fetchLiveScores(); // fetch immédiat
  // Toutes les 60 secondes (limite API gratuite = 10 req/min)
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(fetchLiveScores, 60000);
}

// Bouton live dans l'UI
function addLiveButton(){
  const tabs = document.querySelector('.tabs');
  const btn = document.createElement('button');
  btn.id = 'live-btn';
  btn.className = 'tab-btn';
  btn.style.cssText = 'flex:0 0 auto;padding:13px 18px;color:#ff6666;border-bottom-color:transparent';
  btn.innerHTML = '🔴 AUTO';
  btn.title = 'Mise à jour automatique des scores en direct';
  let active = true;
  btn.addEventListener('click', ()=>{
    active = !active;
    if(active){
      btn.style.color='#ff6666'; btn.textContent='🔴 AUTO';
      startLivePolling();
    } else {
      btn.style.color='rgba(255,255,255,.3)'; btn.textContent='⭕ AUTO';
      if(pollInterval){ clearInterval(pollInterval); pollInterval=null; }
      setLiveVisible(false);
    }
  });
  tabs.appendChild(btn);
}

// Init au chargement
window.addEventListener('load', ()=>{
  addLiveButton();
  startLivePolling();
});
</script>
